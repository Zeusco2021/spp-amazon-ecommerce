# Redis Cluster Configuration
# Requirements: 27.1-27.6, 30.1-30.9, 31.1-31.7

# ============================================================
# CLUSTER CONFIGURATION
# ============================================================

# Enable cluster mode (Req 27.9)
cluster-enabled yes

# Cluster configuration file (auto-managed by Redis)
cluster-config-file nodes.conf

# Timeout for node failure detection in milliseconds (Req 27.7)
cluster-node-timeout 5000

# Allow cluster to operate even if not all slots are covered (Req 27.8)
cluster-require-full-coverage no

# ============================================================
# REPLICATION CONFIGURATION (Req 31.3, 31.4)
# ============================================================

# Enable diskless replication sync
repl-diskless-sync yes

# Delay before starting diskless sync (seconds)
repl-diskless-sync-delay 5

# ============================================================
# PERSISTENCE - AOF (Req 31.1, 31.2)
# ============================================================

# Enable Append Only File persistence
appendonly yes

# Sync AOF every second (balance between performance and durability)
appendfsync everysec

# ============================================================
# PERSISTENCE - RDB Snapshots (Req 30.7, 30.8, 30.9)
# ============================================================

# Save if at least 1 change in 900 seconds (15 minutes)
save 900 1

# Save if at least 10 changes in 300 seconds (5 minutes)
save 300 10

# Save if at least 10000 changes in 60 seconds (1 minute)
save 60 10000

# ============================================================
# MEMORY MANAGEMENT (Req 30.1, 30.2, 30.3)
# ============================================================

# Maximum memory per node: 2GB
maxmemory 2gb

# Eviction policy: Least Recently Used across all keys
maxmemory-policy allkeys-lru

# ============================================================
# NETWORK CONFIGURATION
# ============================================================

# Bind to all interfaces (override per node in docker-compose)
bind 0.0.0.0

# Protected mode off for cluster (nodes communicate internally)
protected-mode no

# ============================================================
# LOGGING
# ============================================================

loglevel notice
logfile ""
