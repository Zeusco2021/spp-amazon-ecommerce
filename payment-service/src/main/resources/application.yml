spring:
  application:
    name: payment-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8086
  forward-headers-strategy: NATIVE
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:classpath:keystore.p12}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:changeit}
    key-store-type: PKCS12
    key-alias: ${SSL_KEY_ALIAS:tomcat}
    protocol: TLS
    enabled-protocols: TLSv1.2,TLSv1.3
  http2:
    enabled: true

payment:
  gateway: stripe
  stripe:
    api-key: ${STRIPE_API_KEY:sk_test_placeholder}
  # Base64-encoded 32-byte AES-256 key. Generate with: openssl rand -base64 32
  encryption:
    key: ${PAYMENT_ENCRYPTION_KEY:dGhpcyBpcyBhIDMyLWJ5dGUgdGVzdCBrZXkgZm9yIGRldg==}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
