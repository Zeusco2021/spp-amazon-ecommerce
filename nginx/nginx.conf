# =============================================================================
# nginx.conf - Amazon Clone E-Commerce Load Balancer Configuration
# =============================================================================
# Requisitos cubiertos: 21, 22, 23, 24, 25, 26
# =============================================================================

# Número de procesos worker (auto = número de CPUs disponibles)
worker_processes auto;

# Archivo de PID del proceso master
pid /var/run/nginx.pid;

# Configuración de eventos
events {
    # Máximo de conexiones simultáneas por worker
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # =========================================================================
    # Configuración básica HTTP
    # =========================================================================
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Habilitar sendfile para transferencia eficiente de archivos
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Tamaño máximo del cuerpo de la petición del cliente (Requisito 26)
    client_max_body_size 10M;

    # Keepalive timeout para conexiones de clientes
    keepalive_timeout 65;

    # =========================================================================
    # Logging de acceso y errores (Requisito 2.7)
    # =========================================================================
    # Formato de log con información detallada para monitoreo
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    # Log de acceso con formato detallado
    access_log /var/log/nginx/access.log main;

    # Log de errores con nivel warn
    error_log /var/log/nginx/error.log warn;

    # =========================================================================
    # Compresión gzip (Requisito 26.7)
    # Habilitar compresión para respuestas mayores a 1KB
    # =========================================================================
    gzip on;
    gzip_min_length 1024;           # Solo comprimir respuestas > 1KB
    gzip_comp_level 6;              # Nivel de compresión (1-9)
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # =========================================================================
    # Rate Limiting (Requisito 24)
    # Zona de memoria compartida de 10MB para contadores por IP
    # Límite: 100 peticiones por segundo por dirección IP
    # =========================================================================
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=100r/s;

    # Código de respuesta cuando se excede el rate limit (Requisito 24.4)
    limit_req_status 429;

    # =========================================================================
    # Upstream Pool - API Gateway Instances (Requisito 21)
    # Algoritmo: least_conn - envía peticiones a la instancia con menos
    # conexiones activas (Requisito 21.1, 21.2)
    # =========================================================================
    upstream api_gateway_backend {
        # Algoritmo least_conn: menor número de conexiones activas
        least_conn;

        # Instancias del API Gateway con health check pasivo
        # max_fails=3: marcar como no disponible tras 3 fallos consecutivos
        # fail_timeout=30s: esperar 30s antes de reintentar (Requisito 23.2, 23.4, 23.5)
        server api-gateway-1:8080 max_fails=3 fail_timeout=30s;
        server api-gateway-2:8080 max_fails=3 fail_timeout=30s;
        server api-gateway-3:8080 max_fails=3 fail_timeout=30s;

        # Keepalive connections al backend (Requisito 26)
        keepalive 32;
    }

    # =========================================================================
    # Servidor HTTP - Redirección a HTTPS (Requisito 22.2)
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # Health check endpoint en HTTP (Requisito 23.6, 23.7)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Redirigir todo el tráfico HTTP a HTTPS (Requisito 22)
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # Servidor HTTPS - Configuración principal (Requisito 22)
    # =========================================================================
    server {
        # Escuchar en puerto 443 con SSL y HTTP/2 (Requisito 22.1, 26.5)
        listen 443 ssl http2;
        server_name _;

        # =====================================================================
        # SSL/TLS Termination (Requisito 22)
        # =====================================================================
        # Certificados SSL/TLS (Requisito 22.3)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Protocolos TLS permitidos: solo TLSv1.2 y TLSv1.3 (Requisito 22.4)
        ssl_protocols TLSv1.2 TLSv1.3;

        # Ciphers seguros (Requisito 22.5)
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Preferir ciphers del servidor sobre los del cliente (Requisito 22.6)
        ssl_prefer_server_ciphers on;

        # Caché de sesiones SSL para mejorar rendimiento
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # =====================================================================
        # Rate Limiting (Requisito 24)
        # burst=200: permite ráfagas de hasta 200 peticiones
        # nodelay: procesar peticiones del burst sin delay (Requisito 24.6)
        # =====================================================================
        limit_req zone=global_limit burst=200 nodelay;

        # =====================================================================
        # Health Check Endpoint del Load Balancer (Requisito 23.6, 23.7)
        # =====================================================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # =====================================================================
        # Proxy a API Gateway Backend (Requisito 21, 22, 25, 26)
        # =====================================================================
        location / {
            # Pasar al upstream pool
            proxy_pass http://api_gateway_backend;

            # Usar HTTP/1.1 para comunicación con backends (Requisito 26.4)
            proxy_http_version 1.1;

            # Habilitar keepalive al backend
            proxy_set_header Connection "";

            # -----------------------------------------------------------------
            # Headers para mantener información del cliente (Requisito 22.8-22.10)
            # -----------------------------------------------------------------
            # Mantener el header Host original (Requisito 26.6)
            proxy_set_header Host $host;

            # IP real del cliente (Requisito 22.9)
            proxy_set_header X-Real-IP $remote_addr;

            # Cadena de IPs de proxies (Requisito 22.10)
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Protocolo original de la petición (Requisito 22.8)
            proxy_set_header X-Forwarded-Proto $scheme;

            # -----------------------------------------------------------------
            # Headers de Rate Limiting (Requisito 24.4)
            # -----------------------------------------------------------------
            add_header X-RateLimit-Limit 100;
            add_header X-RateLimit-Remaining $upstream_http_x_ratelimit_remaining;

            # -----------------------------------------------------------------
            # Timeouts (Requisito 25.7, 25.8, 25.9)
            # -----------------------------------------------------------------
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # -----------------------------------------------------------------
            # Buffering de respuestas (Requisito 26.1, 26.2, 26.3)
            # -----------------------------------------------------------------
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;

            # -----------------------------------------------------------------
            # Retry y Failover Logic (Requisito 25)
            # Reintentar en casos de: error, timeout, http_500, http_502, http_503
            # (Requisito 25.1, 25.2, 25.3, 25.4, 25.5)
            # -----------------------------------------------------------------
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;

            # Máximo 2 intentos de retry (Requisito 25.6)
            proxy_next_upstream_tries 2;

            # Timeout para el proceso de retry (Requisito 25)
            proxy_next_upstream_timeout 10s;
        }
    }
}
