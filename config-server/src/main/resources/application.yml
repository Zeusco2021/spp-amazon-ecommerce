server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config
        git:
          # Use native profile for local dev; switch to git for production
          uri: ${CONFIG_GIT_URI:}
          default-label: main
  profiles:
    active: native

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
