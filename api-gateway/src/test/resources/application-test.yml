spring:
  config:
    import: ""  # Disable config server for tests

  # Disable Redis auto-configuration for tests (no Redis available)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      # Override routes for test - no global rate limiter (requires Redis)
      default-filters:
        - name: CircuitBreaker
          args:
            name: defaultCircuitBreaker
            fallbackUri: forward:/fallback

      routes:
        # User Service - public routes (no auth)
        - id: user-service-public
          uri: http://${USER_SERVICE_HOST:localhost}:${USER_SERVICE_PORT:8081}
          predicates:
            - Path=/api/users/register, /api/users/login
            - Method=POST
          filters:
            - name: RequestLogging
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # User Service - protected routes
        - id: user-service
          uri: http://${USER_SERVICE_HOST:localhost}:${USER_SERVICE_PORT:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - name: JwtAuthentication
            - name: RequestLogging
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # Product Service - public GET routes
        - id: product-service-public
          uri: http://${PRODUCT_SERVICE_HOST:localhost}:${PRODUCT_SERVICE_PORT:8082}
          predicates:
            - Path=/api/products/**
            - Method=GET
          filters:
            - name: RequestLogging
            - name: CircuitBreaker
              args:
                name: productServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # Product Service - protected write routes
        - id: product-service-protected
          uri: http://${PRODUCT_SERVICE_HOST:localhost}:${PRODUCT_SERVICE_PORT:8082}
          predicates:
            - Path=/api/products/**
            - Method=POST, PUT, DELETE, PATCH
          filters:
            - name: JwtAuthentication
            - name: RequestLogging
            - name: CircuitBreaker
              args:
                name: productServiceCircuitBreaker
                fallbackUri: forward:/fallback

jwt:
  secret: myTestSecretKeyForJWTValidationTesting123456789
  expiration: 3600000

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.ecommerce.gateway: DEBUG
    org.springframework.cloud.gateway: WARN
